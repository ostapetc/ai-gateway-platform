networks:
  platform:
    driver: bridge

volumes:
  pgdata:
  redis-data:
  nats-data:
  prom-data:
  grafana-data:
  etcd-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring / healthcheck
    volumes:
      - nats-data:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config", "/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "55679:55679" # zpages
    volumes:
      - ./otelcol.yml:/etc/otelcol/config.yaml:ro
    networks:
      - platform

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks:
      - platform
    depends_on:
      - otelcol

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - platform
    depends_on:
      - prometheus

  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/bitnami/etcd
    networks:
      - platform
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ──────────────────────────────────────────

  users:
    build:
      context: ../..
      dockerfile: services/users/Dockerfile
    ports:
      - "8881:8881"
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  posts:
    build:
      context: ../..
      dockerfile: services/posts/Dockerfile
    ports:
      - "8885:8885"   # gRPC
      - "8882:8882"   # HTTP
    environment:
      ETCD_ADDRESS: etcd:2379
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      etcd:
        condition: service_healthy

  comments:
    build:
      context: ../..
      dockerfile: services/comments/Dockerfile
    ports:
      - "8883:8883"   # gRPC
      - "8884:8884"   # HTTP
    environment:
      ETCD_ADDRESS: etcd:2379
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      etcd:
        condition: service_healthy