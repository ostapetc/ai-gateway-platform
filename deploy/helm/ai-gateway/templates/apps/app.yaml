{{- range $name, $cfg := .Values.apps }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}
    {{- include "ai-gateway.labels" $ | nindent 4 }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ $.Values.registry }}/{{ $name }}:{{ $.Values.tag }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.ports.http }}
            - name: grpc
              containerPort: {{ $cfg.ports.grpc }}
          env:
            - name: ETCD_ADDRESS
              value: "etcd.{{ $.Release.Namespace }}:2379"
          readinessProbe:
            tcpSocket:
              port: {{ $cfg.ports.http }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ $cfg.ports.http }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: {{ $cfg.ports.http }}
      targetPort: {{ $cfg.ports.http }}
    - name: grpc
      port: {{ $cfg.ports.grpc }}
      targetPort: {{ $cfg.ports.grpc }}
{{- end }}
