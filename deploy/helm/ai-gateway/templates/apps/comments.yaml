apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments
  namespace: {{ .Release.Namespace }}
  labels:
    app: comments
    {{- include "ai-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apps.comments.replicas }}
  selector:
    matchLabels:
      app: comments
  template:
    metadata:
      labels:
        app: comments
    spec:
      containers:
        - name: comments
          image: {{ .Values.registry }}/comments:{{ .Values.tag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.apps.comments.ports.grpc }}
            - name: http
              containerPort: {{ .Values.apps.comments.ports.http }}
          env:
            - name: ETCD_ADDRESS
              value: "etcd.{{ .Release.Namespace }}:2379"
          readinessProbe:
            tcpSocket:
              port: {{ .Values.apps.comments.ports.http }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.apps.comments.ports.http }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.apps.comments.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: comments
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: comments
  ports:
    - name: grpc
      port: {{ .Values.apps.comments.ports.grpc }}
      targetPort: {{ .Values.apps.comments.ports.grpc }}
    - name: http
      port: {{ .Values.apps.comments.ports.http }}
      targetPort: {{ .Values.apps.comments.ports.http }}
