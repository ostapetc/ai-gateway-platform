apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: users
                port:
                  number: {{ .Values.apps.users.ports.http }}

          - path: /posts
            pathType: Prefix
            backend:
              service:
                name: posts
                port:
                  number: {{ .Values.apps.posts.ports.http }}

          - path: /comments
            pathType: Prefix
            backend:
              service:
                name: comments
                port:
                  number: {{ .Values.apps.comments.ports.http }}

          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
