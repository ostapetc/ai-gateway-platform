registry: freelikeatruth
tag: latest
imagePullPolicy: IfNotPresent

apps:
  users:
    replicas: 1
    ports:
      http: 8881
      grpc: 8886
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  posts:
    replicas: 1
    ports:
      http: 8882
      grpc: 8885
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  comments:
    replicas: 1
    ports:
      http: 8884
      grpc: 8883
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

cronjobs:
  users:
    schedule: "* * * * *"
    enabled: true
  posts:
    schedule: "* * * * *"
    enabled: true
  comments:
    schedule: "* * * * *"
    enabled: true

infra:
  etcd:
    image: registry.k8s.io/etcd:3.5.9-0
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  postgres:
    image: postgres:16-alpine
    user: platform
    password: platform
    db: platform
    storage: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  redis:
    image: redis:7-alpine
    storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  nats:
    image: nats:2.10-alpine
    storage: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  prometheus:
    image: prom/prometheus:v2.52.0
    storage: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  grafana:
    image: grafana/grafana:11.0.0
    adminUser: admin
    adminPassword: admin
    storage: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.102.0
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

ingress:
  className: nginx
  grpc:
    host: ai-gateway.local
    tlsSecret: ai-gateway-tls
