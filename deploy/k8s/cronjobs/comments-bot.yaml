apiVersion: batch/v1
kind: CronJob
metadata:
  name: comments-bot-cronjob
  namespace: ai-gateway
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: comments-bot
              image: freelikeatruth/comments-bot-cronjob:latest
              imagePullPolicy: IfNotPresent
              args:
                - createcomments
              env:
                - name: ETCD_ADDRESS
                  value: "etcd.ai-gateway:2379"
          restartPolicy: OnFailure
