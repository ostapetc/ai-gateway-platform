apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-gateway
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: users
        static_configs:
          - targets: ['users:8881']

      - job_name: posts
        static_configs:
          - targets: ['posts:8882']

      - job_name: otelcol
        static_configs:
          - targets: ['otelcol:8889']
