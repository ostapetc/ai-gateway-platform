# Image: build with `docker build -t ghcr.io/ostapetc/ai-gateway-platform/users:latest services/users`
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: ai-gateway
  labels:
    app: users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
        - name: users
          image: freelikeatruth/users:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 8886
            - name: http
              containerPort: 8881
          env:
            - name: ETCD_ADDRESS
              value: "etcd.ai-gateway:2379"
          readinessProbe:
            tcpSocket:
              port: 8881
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8881
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
