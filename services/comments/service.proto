syntax = "proto3";

package comments;
option go_package = "./comments";

service Comments {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Comment {
  int64 id = 1;
  int64 user_id = 2;
  int64 post_id = 3;
  string body = 4;
  string created_at = 5;
}

message CreateRequest {
  int64 user_id = 1;
  int64 post_id = 2;
  string body = 3;
}

message CreateResponse {
  int64 id = 1;
}

message ListRequest {
  int64 postID = 1;
}

message ListResponse {
  repeated Comment comments = 1;
}