syntax = "proto3";

package comments;
option go_package = "./comments";

service Comments {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc List(ListRequest) returns (ListResponse);
}

message Comment {
  uint64 id = 1;
  uint64 user_id = 2;
  uint64 post_id = 3;
  string body = 4;
  string created_at = 5;
}

message CreateRequest {
  uint64 user_id = 1;
  uint64 post_id = 2;
  string body = 3;
}

message CreateResponse {
  uint64 id = 1;
}

message ListRequest {
  uint64 post_id = 1;
}

message ListResponse {
  repeated Comment comments = 1;
}