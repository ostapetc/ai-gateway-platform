apiVersion: batch/v1
kind: CronJob
metadata:
  name: posts-bot-printtime
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: printtime
              image: posts-bot:latest
              args:
                - printtime
          restartPolicy: OnFailure
